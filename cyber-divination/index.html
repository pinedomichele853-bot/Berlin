<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博天机阁 · Cyber Divination Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body class="bg-cyber-dark min-h-screen font-sans">
    <!-- Header -->
    <header class="border-b border-cyber-gold/20 bg-black/30 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyber-gold to-cyber-purple flex items-center justify-center text-xl font-bold text-white mystic-glow">
                    天
                </div>
                <div>
                    <h1 class="text-xl font-bold text-cyber-gold tracking-wider">赛博天机阁</h1>
                    <p class="text-xs text-gray-500 tracking-widest">CYBER DIVINATION ENGINE</p>
                </div>
            </div>
            <button id="themeToggle" class="text-gray-400 hover:text-cyber-gold transition-colors px-3 py-1 border border-gray-700 rounded text-sm">
                🌓 入玄
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Hero / Input Section -->
        <section id="inputSection" class="max-w-2xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyber-gold via-yellow-300 to-cyber-purple mb-4 tracking-wider">
                    天机不可泄露
                </h2>
                <p class="text-gray-400 text-sm tracking-widest">
                    输入命盘 · 推演三世 · 窥破天机
                </p>
            </div>

            <!-- Form Card -->
            <div class="bg-black/40 backdrop-blur-lg rounded-2xl border border-cyber-gold/20 p-8 shadow-2xl shadow-cyber-purple/10">
                <form id="divinationForm" class="space-y-6">
                    <!-- Name -->
                    <div>
                        <label class="block text-cyber-gold text-sm mb-2 tracking-wider">姓名</label>
                        <input type="text" id="userName" required
                               class="w-full bg-black/60 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:border-cyber-gold focus:ring-1 focus:ring-cyber-gold/50 transition-all"
                               placeholder="请输入姓名">
                    </div>

                    <!-- Gender -->
                    <div>
                        <label class="block text-cyber-gold text-sm mb-2 tracking-wider">性别</label>
                        <div class="flex gap-4">
                            <label class="flex-1">
                                <input type="radio" name="gender" value="男" checked
                                       class="sr-only peer">
                                <div class="text-center bg-black/60 border border-gray-700 rounded-lg px-4 py-3 text-gray-400 peer-checked:border-cyber-gold peer-checked:text-cyber-gold peer-checked:bg-cyber-gold/10 transition-all cursor-pointer">
                                    ♂ 乾造
                                </div>
                            </label>
                            <label class="flex-1">
                                <input type="radio" name="gender" value="女"
                                       class="sr-only peer">
                                <div class="text-center bg-black/60 border border-gray-700 rounded-lg px-4 py-3 text-gray-400 peer-checked:border-cyber-gold peer-checked:text-cyber-gold peer-checked:bg-cyber-gold/10 transition-all cursor-pointer">
                                    ♀ 坤造
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Birth Date -->
                    <div class="grid grid-cols-4 gap-3">
                        <div>
                            <label class="block text-cyber-gold text-sm mb-2 tracking-wider">年</label>
                            <input type="number" id="birthYear" min="1900" max="2100" value="2000" required
                                   class="w-full bg-black/60 border border-gray-700 rounded-lg px-3 py-3 text-white placeholder-gray-600 focus:border-cyber-gold focus:ring-1 focus:ring-cyber-gold/50 transition-all">
                        </div>
                        <div>
                            <label class="block text-cyber-gold text-sm mb-2 tracking-wider">月</label>
                            <input type="number" id="birthMonth" min="1" max="12" value="1" required
                                   class="w-full bg-black/60 border border-gray-700 rounded-lg px-3 py-3 text-white placeholder-gray-600 focus:border-cyber-gold focus:ring-1 focus:ring-cyber-gold/50 transition-all">
                        </div>
                        <div>
                            <label class="block text-cyber-gold text-sm mb-2 tracking-wider">日</label>
                            <input type="number" id="birthDay" min="1" max="31" value="1" required
                                   class="w-full bg-black/60 border border-gray-700 rounded-lg px-3 py-3 text-white placeholder-gray-600 focus:border-cyber-gold focus:ring-1 focus:ring-cyber-gold/50 transition-all">
                        </div>
                        <div>
                            <label class="block text-cyber-gold text-sm mb-2 tracking-wider">时</label>
                            <select id="birthHour"
                                    class="w-full bg-black/60 border border-gray-700 rounded-lg px-3 py-3 text-white focus:border-cyber-gold focus:ring-1 focus:ring-cyber-gold/50 transition-all">
                                <option value="0">子 (23-01)</option>
                                <option value="1">丑 (01-03)</option>
                                <option value="2">寅 (03-05)</option>
                                <option value="3">卯 (05-07)</option>
                                <option value="4">辰 (07-09)</option>
                                <option value="5">巳 (09-11)</option>
                                <option value="6" selected>午 (11-13)</option>
                                <option value="7">未 (13-15)</option>
                                <option value="8">申 (15-17)</option>
                                <option value="9">酉 (17-19)</option>
                                <option value="10">戌 (19-21)</option>
                                <option value="11">亥 (21-23)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                            class="w-full bg-gradient-to-r from-cyber-gold to-cyber-purple text-white font-bold py-4 rounded-lg transition-all hover:scale-[1.02] hover:shadow-lg hover:shadow-cyber-purple/30 active:scale-[0.98] tracking-widest text-lg">
                        ⚡ 开启天机
                    </button>
                </form>
            </div>
        </section>

        <!-- Loading Animation -->
        <section id="loadingSection" class="hidden max-w-2xl mx-auto text-center py-20">
            <div class="mystic-container">
                <div class="mystic-ring"></div>
                <div class="mystic-ring mystic-ring-2"></div>
                <div class="mystic-ring mystic-ring-3"></div>
                <div class="mystic-core">
                    <span class="text-4xl">☯</span>
                </div>
            </div>
            <h3 class="text-2xl text-cyber-gold mt-12 mb-4 tracking-wider animate-pulse">天机推演中...</h3>
            <div class="space-y-2 text-gray-500 text-sm">
                <p id="loadingStep1" class="loading-step opacity-40">⚡ 接引星辰之力...</p>
                <p id="loadingStep2" class="loading-step opacity-20">🔮 排定八字命盘...</p>
                <p id="loadingStep3" class="loading-step opacity-20">🌟 推演紫微星曜...</p>
                <p id="loadingStep4" class="loading-step opacity-20">🌀 奇门遁甲演局...</p>
                <p id="loadingStep5" class="loading-step opacity-20">📜 天机裁决生成...</p>
            </div>
        </section>

        <!-- Result Section -->
        <section id="resultSection" class="hidden max-w-4xl mx-auto">
            <!-- Tabs Navigation -->
            <div class="flex flex-wrap gap-2 mb-8 border-b border-gray-800 pb-2">
                <button class="result-tab active" data-tab="bazi">
                    <span class="text-lg">📜</span> 干支命盘
                </button>
                <button class="result-tab" data-tab="zwei">
                    <span class="text-lg">🌟</span> 紫微星曜
                </button>
                <button class="result-tab" data-tab="qimen">
                    <span class="text-lg">🌀</span> 奇门局象
                </button>
                <button class="result-tab" data-tab="verdict">
                    <span class="text-lg">⚖️</span> 天机裁决
                </button>
            </div>

            <!-- Bazi Panel -->
            <div id="panel-bazi" class="result-panel active">
                <div class="bg-black/40 backdrop-blur-lg rounded-2xl border border-cyber-gold/20 p-8">
                    <h3 class="text-2xl text-cyber-gold mb-6 tracking-wider flex items-center gap-3">
                        <span>📜</span> 干支命盘
                    </h3>
                    <div id="baziContent" class="space-y-4 text-gray-300">
                        <!-- Dynamically filled -->
                    </div>
                </div>
            </div>

            <!-- Ziwei Panel -->
            <div id="panel-zwei" class="result-panel">
                <div class="bg-black/40 backdrop-blur-lg rounded-2xl border border-cyber-gold/20 p-8">
                    <h3 class="text-2xl text-cyber-gold mb-6 tracking-wider flex items-center gap-3">
                        <span>🌟</span> 紫微星曜
                    </h3>
                    <div id="zweiContent" class="space-y-4 text-gray-300">
                        <!-- Dynamically filled -->
                    </div>
                </div>
            </div>

            <!-- Qimen Panel -->
            <div id="panel-qimen" class="result-panel">
                <div class="bg-black/40 backdrop-blur-lg rounded-2xl border border-cyber-gold/20 p-8">
                    <h3 class="text-2xl text-cyber-gold mb-6 tracking-wider flex items-center gap-3">
                        <span>🌀</span> 奇门局象
                    </h3>
                    <div id="qimenContent" class="space-y-4 text-gray-300">
                        <!-- Dynamically filled -->
                    </div>
                </div>
            </div>

            <!-- Verdict Panel -->
            <div id="panel-verdict" class="result-panel">
                <div class="bg-black/40 backdrop-blur-lg rounded-2xl border border-cyber-gold/20 p-8">
                    <h3 class="text-2xl text-cyber-gold mb-6 tracking-wider flex items-center gap-3">
                        <span>⚖️</span> 天机裁决与逆天改运建议
                    </h3>
                    <div id="verdictContent" class="space-y-4 text-gray-300">
                        <!-- Dynamically filled -->
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-wrap gap-4 mt-8 justify-center">
                <button id="generateCardBtn"
                        class="px-6 py-3 bg-gradient-to-r from-cyber-gold to-yellow-600 text-black font-bold rounded-lg hover:scale-105 transition-all tracking-wider shadow-lg">
                    🎴 生成天机卡片
                </button>
                <button id="backToHomeBtn"
                        class="px-6 py-3 border border-gray-700 text-gray-400 rounded-lg hover:border-cyber-gold hover:text-cyber-gold transition-all tracking-wider">
                    ↺ 重新推演
                </button>
            </div>
        </section>

        <!-- Card Preview Modal -->
        <div id="cardModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-gray-900 rounded-2xl p-8 max-w-md w-full border border-cyber-gold/30 shadow-2xl shadow-cyber-purple/20">
                <h3 class="text-cyber-gold text-xl mb-6 text-center tracking-wider">🏮 天机卡片</h3>
                <div id="cardContent" class="bg-gradient-to-br from-gray-800 to-black rounded-xl p-6 border border-cyber-gold/20 text-white text-sm space-y-3 mystic-card">
                    <!-- Card content -->
                </div>
                <div class="flex gap-4 mt-6">
                    <button id="copyCardBtn" class="flex-1 px-4 py-3 bg-cyber-gold text-black font-bold rounded-lg hover:scale-105 transition-all tracking-wider">
                        📋 复制天机
                    </button>
                    <button id="closeCardBtn" class="flex-1 px-4 py-3 border border-gray-700 text-gray-400 rounded-lg hover:border-cyber-gold hover:text-cyber-gold transition-all">
                        ✕ 关闭
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 mt-20 py-6 text-center">
        <p class="text-gray-600 text-xs tracking-widest">
            赛博天机阁 · Cyber Divination Engine v1.0<br>
            运算结果仅供娱乐 · 命运终在你手中
        </p>
    </footer>
</body>
</html>
