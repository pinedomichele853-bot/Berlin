<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .game-container {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background: #0f3460;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .score-box {
            background: #0f3460;
            padding: 8px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .score-box span {
            color: #e94560;
            font-size: 22px;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: #d63851;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #0f3460;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
            box-shadow: 0 5px 15px rgba(15, 52, 96, 0.4);
        }

        .game-over-message {
            color: #e94560;
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .arrow-controls {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 6px;
            justify-content: center;
            margin-top: 15px;
        }

        .arrow-btn {
            background: #0f3460;
            color: #fff;
            border: 2px solid #1a4a7a;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s;
        }

        .arrow-btn:active {
            background: #e94560;
            border-color: #e94560;
        }

        .arrow-up { grid-column: 2; grid-row: 1; }
        .arrow-left { grid-column: 1; grid-row: 2; }
        .arrow-down { grid-column: 2; grid-row: 2; }
        .arrow-right { grid-column: 3; grid-row: 2; }

        .hint {
            color: #7b8db3;
            font-size: 14px;
            margin-top: 12px;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 15px;
            }
            canvas {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="game-header">
            <div class="score-box">分数: <span id="score">0</span></div>
            <div class="score-box">最高分: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over-message" id="gameOverMessage"></div>
        <div class="controls">
            <button class="btn" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="pauseBtn">暂停</button>
        </div>
        <div class="arrow-controls">
            <button class="arrow-btn arrow-up" id="arrowUp">▲</button>
            <button class="arrow-btn arrow-left" id="arrowLeft">◀</button>
            <button class="arrow-btn arrow-down" id="arrowDown">▼</button>
            <button class="arrow-btn arrow-right" id="arrowRight">▶</button>
        </div>
        <div class="hint">使用键盘方向键或点击按钮控制蛇的移动</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // Game settings
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;

        // Game state
        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop = null;
        let speed = 150;

        highScoreElement.textContent = highScore;

        // Initialize game
        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            gameOverMessage.textContent = '';
            generateFood();
            draw();
        }

        // Generate food at random position
        function generateFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT)
                };
            } while (snake.some(segment => segment.x === pos.x && segment.y === pos.y));
            food = pos;
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines (subtle)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const x = segment.x * GRID_SIZE;
                const y = segment.y * GRID_SIZE;
                const padding = 1;
                const radius = 4;

                if (isHead) {
                    // Snake head
                    ctx.fillStyle = '#e94560';
                    ctx.shadowColor = '#e94560';
                    ctx.shadowBlur = 10;
                    roundRect(ctx, x + padding, y + padding, GRID_SIZE - padding * 2, GRID_SIZE - padding * 2, radius);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Draw eyes
                    ctx.fillStyle = '#fff';
                    const eyeSize = 4;
                    const eyeOffset = 5;
                    ctx.beginPath();
                    ctx.arc(x + GRID_SIZE / 2 - 4, y + GRID_SIZE / 2 - 3, eyeSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + GRID_SIZE / 2 + 4, y + GRID_SIZE / 2 - 3, eyeSize / 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Pupils
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(x + GRID_SIZE / 2 - 4 + direction.x, y + GRID_SIZE / 2 - 3 + direction.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + GRID_SIZE / 2 + 4 + direction.x, y + GRID_SIZE / 2 - 3 + direction.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Snake body - gradient from head to tail
                    const gradient = 1 - (index / snake.length) * 0.6;
                    const r = Math.round(233 * gradient);
                    const g = Math.round(69 * gradient + 50 * (1 - gradient));
                    const b = Math.round(96 * gradient + 150 * (1 - gradient));
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    roundRect(ctx, x + padding + 1, y + padding + 1, GRID_SIZE - padding * 2 - 2, GRID_SIZE - padding * 2 - 2, radius - 1);
                    ctx.fill();
                }
            });

            // Draw food
            const fx = food.x * GRID_SIZE;
            const fy = food.y * GRID_SIZE;
            const foodPadding = 2;

            // Glow effect
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, GRID_SIZE / 2 - foodPadding, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Inner circle
            ctx.fillStyle = '#ff6b81';
            ctx.beginPath();
            ctx.arc(fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, GRID_SIZE / 2 - foodPadding - 3, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(fx + GRID_SIZE / 2 - 3, fy + GRID_SIZE / 2 - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Helper: draw rounded rectangle
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // Update game state
        function update() {
            if (!gameRunning || gamePaused) return;

            direction = { ...nextDirection };

            // Calculate new head position
            const newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= TILE_COUNT || newHead.y < 0 || newHead.y >= TILE_COUNT) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameOver();
                return;
            }

            // Move snake
            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();

                // Increase speed slightly
                if (speed > 70) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
                gameOverMessage.textContent = '🎉 新纪录！太棒了！';
            } else {
                gameOverMessage.textContent = '💀 游戏结束！得分: ' + score;
            }

            startBtn.textContent = '重新开始';
            pauseBtn.textContent = '暂停';
            pauseBtn.disabled = true;
        }

        // Start game
        function startGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            init();
            gameRunning = true;
            gamePaused = false;
            speed = 150;
            startBtn.textContent = '重新开始';
            pauseBtn.textContent = '暂停';
            pauseBtn.disabled = false;
            gameLoop = setInterval(update, speed);
        }

        // Toggle pause
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
            if (gamePaused) {
                gameOverMessage.textContent = '⏸️ 已暂停';
            } else {
                gameOverMessage.textContent = '';
            }
            draw();
        }

        // Handle keyboard input
        function handleKey(e) {
            const key = e.key;
            e.preventDefault();

            if (!gameRunning || gamePaused) return;

            switch (key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
                case ' ':
                    togglePause();
                    break;
            }
        }

        // Set direction from button
        function setDirection(x, y) {
            if (!gameRunning || gamePaused) return;
            if (direction.x === 0 && x !== 0) nextDirection = { x, y };
            if (direction.y === 0 && y !== 0) nextDirection = { x, y };
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                handleKey(e);
            }
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);

        // Arrow button controls
        document.getElementById('arrowUp').addEventListener('click', () => setDirection(0, -1));
        document.getElementById('arrowDown').addEventListener('click', () => setDirection(0, 1));
        document.getElementById('arrowLeft').addEventListener('click', () => setDirection(-1, 0));
        document.getElementById('arrowRight').addEventListener('click', () => setDirection(1, 0));

        // Touch / drag prevention
        document.querySelectorAll('.arrow-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => e.preventDefault());
        });

        // Initial render
        init();
    </script>
</body>
</html>
