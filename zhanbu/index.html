// ====== 工具函数 ======

/** DJB2 Hash —— 生成固定数字种子 */
function djb2Hash(str) {
  let hash = 5381;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash) + str.charCodeAt(i);
    hash = hash & 0xffffffff; // 32-bit
  }
  return Math.abs(hash);
}

/** 线性同余伪随机 (相同种子永远相同结果) */
function createRNG(seed) {
  let state = seed;
  return function() {
    state = (state * 1664525 + 1013904223) & 0xffffffff;
    return (state >>> 0) / 0xffffffff;
  };
}

/** 从数组中随机取一项 */
function pick(arr, rand) {
  return arr[Math.floor(rand() * arr.length)];
}

/** 从数组中随机取一项并移除 (不重复) */
function pickAndRemove(arr, rand) {
  const idx = Math.floor(rand() * arr.length);
  return arr.splice(idx, 1)[0];
}

/** 根据种子随机取 n 项 (可重复) */
function pickN(arr, n, rand) {
  const result = [];
  for (let i = 0; i < n; i++) {
    result.push(pick(arr, rand));
  }
  return result;
}

  '曾经沧海难为水，除却巫山不是云。${name}君，人生起落本是常态，莫因一时得失而忘形或沮丧。守得住寂寞，才看得到繁华。大器晚成者，往往最为贵重。',
  '一切有为法，如梦幻泡影，如露亦如电，应作如是观。${name}君，看淡得失，放下执念，方能自在。命中有定，运中有变，修心为上，改运次之。',
  '天地不仁，以万物为刍狗；圣人不仁，以百姓为刍狗。${name}君，世间万物皆在因果之中，种善因得善果，种恶因得恶果。愿君慎独修身，善自为之。'
];

// ====== 核心运算引擎 ======

function performDivination(name, gender, birthStr) {
  // 1. 生成固定种子
  const seedStr = name + gender + birthStr + '勃林大师·玄门正宗';
  const seed = djb2Hash(seedStr);
  const rand = createRNG(seed);

  // 2. 计算生肖
  const date = new Date(birthStr);
  const year = date.getFullYear();
  const zodiacIdx = (year - 4) % 12;
  const zodiac = ZODIAC[zodiacIdx >= 0 ? zodiacIdx : zodiacIdx + 12];
  const zodiacWxing = ZODIAC_WUXING[zodiac];
  const zodiacZhi = ZODIAC_YINYANG[zodiac];
  const zodiacChar = ZODIAC_PERSONALITY[zodiac];

  // 3. 模拟四柱
  const yearGan = TIAN_GAN[(year - 4) % 10];
  const yearZhi = DI_ZHI[(year - 4) % 12];
  const monthGan = TIAN_GAN[Math.floor(rand() * 10)];
  const monthZhi = DI_ZHI[date.getMonth() % 12];
  const dayGan = TIAN_GAN[Math.floor(rand() * 10)];
  const dayZhi = DI_ZHI[Math.floor(rand() * 12)];
  const hourGan = TIAN_GAN[Math.floor(rand() * 10)];
  const hourZhi = DI_ZHI[Math.floor(rand() * 12)];

  const dayWxing = getWxing(dayGan);
  const yearWxing = getWxing(yearGan);
  const monthWxing = getWxing(monthGan);
  const zhiWxing = getZhiWxing(dayZhi);
  const zhiHide = ['甲木','乙木','丙火','丁火','戊土','己土','庚金','辛金','壬水','癸水'][Math.floor(rand() * 10)];

  const month = date.getMonth();
  let season = '';
  if (month >= 2 && month <= 4) season = '春';
  else if (month >= 5 && month <= 7) season = '夏';
  else if (month >= 8 && month <= 10) season = '秋';
  else season = '冬';
  const seasonQi = SEASON_QI[season];

  const wxingDesc = WXING_DESC[dayWxing] || '中和之气，不偏不倚';

  // 五行分布模拟
  const wxingElements = ['金','木','水','火','土'];
  const wxingValues = {};
  let total = 0;
  wxingElements.forEach(w => {
    wxingValues[w] = Math.floor(rand() * 40 + 10);
    total += wxingValues[w];
  });
  // 归一化
  Object.keys(wxingValues).forEach(k => {
    wxingValues[k] = Math.round(wxingValues[k] / total * 100);
  });

  // 找最强和最弱
  let strongWxing = '', weakWxing = '', maxVal = -1, minVal = 999;
  Object.entries(wxingValues).forEach(([k, v]) => {
    if (v > maxVal) { maxVal = v; strongWxing = k; }
    if (v < minVal) { minVal = v; weakWxing = k; }
  });

  // 喜用神和忌神
  const wxingCycle = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
  const wxingCycleKe = { '木':'土','土':'水','水':'火','火':'金','金':'木' };
  const xiGod = wxingCycle[weakWxing] || '火';
  const jiGod = wxingCycleKe[strongWxing] || '金';

  // 随机选择
  const outward = pick(OUTWARD_TRAITS, rand);
  const inward = pick(INWARD_TRAITS, rand);
  const talent = pick(TALENT_TRAITS, rand);
  const weakness = pick(WEAKNESS_TRAITS, rand);
  const seatDesc = pick(SEAT_DESCS, rand);
  const temperSummary = pick(TEMPER_SUMMARIES, rand);

  // 紫微
  const mainStar = pick(ZIWEI_STARS, rand);
  const starMeaning = ZIWEI_STAR_MEANINGS[mainStar];
  const zhengCai = pick(ZIWEI_ZHENGCAI, rand);
  const pianCai = pick(ZIWEI_PIANCAI, rand);
  const caiMethod = pick(ZIWEI_CAI_METHOD, rand);
  const caiTaboo = pick(ZIWEI_CAI_TABOO, rand);
  const caiSource = pick(ZIWEI_CAI_SOURCE, rand);
  const caiAge = pick(ZIWEI_CAI_AGES, rand);

  const star2 = pick(ZIWEI_STARS.filter(s => s !== mainStar), rand);
  const meaning2 = ZIWEI_STAR_MEANINGS[star2];
  const careerDir = pick(CAREER_DIRS, rand);
  const careerAge = pick(ZIWEI_CAI_AGES, rand);
  const careerEvent = pick(CAREER_EVENTS, rand);
  const careerAdvice = pick(CAREER_ADVICE, rand);
  const careerTaboo = pick(CAREER_TABOO, rand);

  const star3 = pick(ZIWEI_STARS.filter(s => s !== mainStar && s !== star2), rand);
  const meaning3 = ZIWEI_STAR_MEANINGS[star3];
  const migrationLuck = pick(MIGRATION_LUCK, rand);
  const migrationDir = pick(MIGRATION_DIRS, rand);

  // 奇门
  const qimenStar = pick(NINE_STARS, rand);
  const starM = NINE_STAR_MEANINGS[qimenStar];
  const qimenGate = pick(EIGHT_GATES, rand);
  const gateM = GATE_MEANINGS[qimenGate];
  const qimenGod = pick(EIGHT_GODS, rand);
  const godM = GOD_MEANINGS[qimenGod];
  const goodDir = pick(DIRECTIONS, rand);
  let badDir = pick(DIRECTIONS, rand);
  while (badDir === goodDir) badDir = pick(DIRECTIONS, rand);
  const overallQi = pick(QIMEN_OVERALL, rand);
  const overallQiFinal = overallQi
    .replace('${goodDir}', goodDir)
    .replace('${badDir}', badDir);

  // 流年
  const y1 = year + 1;
  const y2 = year + 2;
  const y3 = year + 3;
  const y1career = pick(YEAR_CAREER, rand);
  const y2career = pick(YEAR_CAREER, rand);
  const y3career = pick(YEAR_CAREER, rand);
  const y1love = pick(YEAR_LOVE, rand);
  const y2love = pick(YEAR_LOVE, rand);
  const y3love = pick(YEAR_LOVE, rand);
  const y1health = pick(YEAR_HEALTH, rand);
  const y2health = pick(YEAR_HEALTH, rand);
  const y3health = pick(YEAR_HEALTH, rand);
  const y1advice = pick(YEAR_ADVICE, rand);
  const y2advice = pick(YEAR_ADVICE, rand);
  const y3advice = pick(YEAR_ADVICE, rand);
  const y1overall = pick(YEAR_TYPES, rand);
  const y2overall = pick(YEAR_TYPES, rand);
  const y3overall = pick(YEAR_TYPES, rand);

  // 卷首
  const poem = pick(OPENING_POEMS, rand);
  const overviewTmpl = pick(OVERVIEW_TEMPLATES, rand);
  const overview = overviewTmpl
    .replace(/\$\{name\}/g, name)
    .replace(/\$\{gender\}/g, gender === '乾造' ? '乾造（男命）' : '坤造（女命）')
    .replace(/\$\{zodiac\}/g, zodiac)
    .replace(/\$\{zodiacWxing\}/g, zodiacWxing)
    .replace(/\$\{zodiacChar\}/g, zodiacChar);

  // 四柱
  const baziTmpl = pick(BAZI_PILLAR_TEMPLATES, rand);
  const baziAnalysis = baziTmpl
    .replace(/\$\{yearGan\}/g, yearGan)
    .replace(/\$\{yearZhi\}/g, yearZhi)
    .replace(/\$\{monthGan\}/g, monthGan)
    .replace(/\$\{monthZhi\}/g, monthZhi)
    .replace(/\$\{dayGan\}/g, dayGan)
    .replace(/\$\{dayZhi\}/g, dayZhi)
    .replace(/\$\{hourGan\}/g, hourGan)
    .replace(/\$\{hourZhi\}/g, hourZhi)
    .replace(/\$\{dayWxing\}/g, dayWxing)
    .replace(/\$\{season\}/g, season)
    .replace(/\$\{seasonQi\}/g, seasonQi)
    .replace(/\$\{wxingDesc\}/g, wxingDesc)
    .replace(/\$\{mu\}/g, wxingValues['木'])
    .replace(/\$\{huo\}/g, wxingValues['火'])
    .replace(/\$\{tu\}/g, wxingValues['土'])
    .replace(/\$\{jin\}/g, wxingValues['金'])
    .replace(/\$\{shui\}/g, wxingValues['水'])
    .replace(/\$\{yearWxing\}/g, yearWxing)
    .replace(/\$\{zhiWxing\}/g, zhiWxing)
    .replace(/\$\{zhiHide\}/g, zhiHide)
    .replace(/\$\{monthWxing\}/g, monthWxing);

  const strengthTmpl = pick(STRENGTH_ANALYSIS, rand);
  const strengthAnalysis = strengthTmpl
    .replace(/\$\{strongWxing\}/g, strongWxing)
    .replace(/\$\{weakWxing\}/g, weakWxing)
    .replace(/\$\{xiGod\}/g, xiGod)
    .replace(/\$\{jiGod\}/g, jiGod);

  const charTmpl = pick(CHARACTER_ANALYSIS, rand);
  const charAnalysis = charTmpl
    .replace(/\$\{name\}/g, name)
    .replace(/\$\{outward\}/g, outward)
    .replace(/\$\{inward\}/g, inward)
    .replace(/\$\{dayGan\}/g, dayGan)
    .replace(/\$\{dayZhi\}/g, dayZhi)
    .replace(/\$\{seatDesc\}/g, seatDesc)
    .replace(/\$\{zodiac\}/g, zodiac)
    .replace(/\$\{zodiacChar\}/g, zodiacChar)
    .replace(/\$\{temperSummary\}/g, temperSummary)
    .replace(/\$\{talent\}/g, talent)
    .replace(/\$\{weakness\}/g, weakness);

  // 紫微
  const caiboTmpl = pick(CAIBO_PALACE, rand);
  const caiboAnalysis = caiboTmpl
    .replace(/\$\{star\}/g, mainStar)
    .replace(/\$\{meaning\}/g, starMeaning)
    .replace(/\$\{zhengCai\}/g, zhengCai)
    .replace(/\$\{pianCai\}/g, pianCai)
    .replace(/\$\{caiMethod\}/g, caiMethod)
    .replace(/\$\{caiTaboo\}/g, caiTaboo)
    .replace(/\$\{caiSource\}/g, caiSource)
    .replace(/\$\{caiAge\}/g, caiAge);

  const guanluTmpl = pick(GUANLU_PALACE, rand);
  const guanluAnalysis = guanluTmpl
    .replace(/\$\{star\}/g, star2)
    .replace(/\$\{meaning\}/g, meaning2)
    .replace(/\$\{careerDir\}/g, careerDir)
    .replace(/\$\{careerAge\}/g, careerAge)
    .replace(/\$\{careerEvent\}/g, careerEvent)
    .replace(/\$\{careerAdvice\}/g, careerAdvice)
    .replace(/\$\{careerTaboo\}/g, careerTaboo);

  const qianyiTmpl = pick(QIANYI_PALACE, rand);
  const qianyiAnalysis = qianyiTmpl
    .replace(/\$\{star\}/g, star3)
    .replace(/\$\{meaning\}/g, meaning3)
    .replace(/\$\{migrationLuck\}/g, migrationLuck)
    .replace(/\$\{migrationDir\}/g, migrationDir);

  // 奇门
  const qimenTmpl = pick(QIMEN_ANALYSIS, rand);
  const qimenAnalysis = qimenTmpl
    .replace(/\$\{star\}/g, qimenStar)
    .replace(/\$\{starM\}/g, starM)
    .replace(/\$\{gate\}/g, qimenGate)
    .replace(/\$\{gateM\}/g, gateM)
    .replace(/\$\{god\}/g, qimenGod)
    .replace(/\$\{godM\}/g, godM)
    .replace(/\$\{overallQi\}/g, overallQiFinal);

  // 流年
  const yearTmpl = pick(YEAR_PREDICTIONS, rand);
  const yearAnalysis = yearTmpl
    .replace(/\$\{y1\}/g, y1)
    .replace(/\$\{y2\}/g, y2)
    .replace(/\$\{y3\}/g, y3)
    .replace(/\$\{y1career\}/g, y1career)
    .replace(/\$\{y2career\}/g, y2career)
    .replace(/\$\{y3career\}/g, y3career)
    .replace(/\$\{y1love\}/g, y1love)
    .replace(/\$\{y2love\}/g, y2love)
    .replace(/\$\{y3love\}/g, y3love)
    .replace(/\$\{y1health\}/g, y1health)
    .replace(/\$\{y2health\}/g, y2health)
    .replace(/\$\{y3health\}/g, y3health)
    .replace(/\$\{y1advice\}/g, y1advice)
    .replace(/\$\{y2advice\}/g, y2advice)
    .replace(/\$\{y3advice\}/g, y3advice)
    .replace(/\$\{y1overall\}/g, y1overall)
    .replace(/\$\{y2overall\}/g, y2overall)
    .replace(/\$\{y3overall\}/g, y3overall);

  // 寄语
  const finalWordTmpl = pick(FINAL_WORDS, rand);
  const finalWord = finalWordTmpl.replace(/\$\{name\}/g, name);

  // 拼装完整报告
  const report = {
    poem: poem,
    overview: overview,
    bazi: baziAnalysis + '\n\n' + strengthAnalysis + '\n\n' + charAnalysis,
    ziwei: '【命宫】命宫主星为' + mainStar + '。' + starMeaning + '。\n\n【财帛宫】' + caiboAnalysis + '\n\n【官禄宫】' + guanluAnalysis + '\n\n【迁移宫】' + qianyiAnalysis,
    qimen: qimenAnalysis,
    year: yearAnalysis,
    final: finalWord
  };

  return report;
}

function getWxing(gan) {
  const map = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
  return map[gan] || '土';
}

function getZhiWxing(zhi) {
  const map = {'子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'};
  return map[zhi] || '土';
}

// ====== 渲染函数 ======

function renderReport(report) {
  const container = document.getElementById('resultContent');
  container.innerHTML = '';

  // 卷首
  const section0 = document.createElement('div');
  section0.className = 'result-section fade-in';
  section0.innerHTML = `
    <h3>· 卷首语 ·</h3>
    <div class="text-center italic text-[#d4af37] text-opacity-80 mb-4 leading-relaxed">${report.poem}</div>
    <p class="text-[#d4c5a0] leading-relaxed text-sm" style="text-indent: 2em;">${report.overview}</p>
  `;
  container.appendChild(section0);

  // 四柱八字
  const section1 = document.createElement('div');
  section1.className = 'result-section fade-in';
  section1.style.animationDelay = '0.1s';
  const baziHtml = report.bazi.split('\n\n').map(p => `<p class="text-[#d4c5a0] leading-relaxed text-sm mb-3" style="text-indent: 2em;">${p}</p>`).join('');
  section1.innerHTML = `
    <h3>· 四柱八字与五行解析 ·</h3>
    ${baziHtml}
  `;
  container.appendChild(section1);

  // 紫微斗数
  const section2 = document.createElement('div');
  section2.className = 'result-section fade-in';
  section2.style.animationDelay = '0.2s';
  const ziweiHtml = report.ziwei.split('\n\n').map(p => `<p class="text-[#d4c5a0] leading-relaxed text-sm mb-3" style="text-indent: 2em;">${p.replace('【命宫】','').replace('【财帛宫】','').replace('【官禄宫】','').replace('【迁移宫】','')}</p>`).join('');
  const ziweiLabels = report.ziwei.match(/【([^】]+)】/g) || [];
  const ziweiContents = report.ziwei.split(/【[^】]+】/).filter(s => s.trim());
  let ziweiFinal = '';
  const labelMap = {'命宫':'命宫推演','财帛宫':'财帛宫解析','官禄宫':'官禄宫格局','迁移宫':'迁移宫展望'};
  ziweiLabels.forEach((l, i) => {
    const key = l.replace(/[【】]/g, '');
    const label = labelMap[key] || key;
    ziweiFinal += `<p class="text-[#d4af37] text-sm font-bold mb-1 mt-3">【${label}】</p>`;
    if (ziweiContents[i]) {
      ziweiFinal += `<p class="text-[#d4c5a0] leading-relaxed text-sm mb-2" style="text-indent: 2em;">${ziweiContents[i].trim()}</p>`;
    }
  });
  section2.innerHTML = `
    <h3>· 紫微斗数命宫推演 ·</h3>
    ${ziweiFinal}
  `;
  container.appendChild(section2);

  // 奇门遁甲
  const section3 = document.createElement('div');
  section3.className = 'result-section fade-in';
  section3.style.animationDelay = '0.3s';
  section3.innerHTML = `
    <h3>· 奇门遁甲现状与吉凶 ·</h3>
    <p class="text-[#d4c5a0] leading-relaxed text-sm" style="text-indent: 2em;">${report.qimen}</p>
  `;
  container.appendChild(section3);

  // 流年大运
  const section4 = document.createElement('div');
  section4.className = 'result-section fade-in';
  section4.style.animationDelay = '0.4s';
  const yearHtml = report.year.split('\n').map(p => {
    if (p.trim().startsWith('未来') || p.trim().startsWith('流年') || p.trim().startsWith('大后')) {
      return `<p class="text-[#d4af37] text-sm font-bold mb-2">${p}</p>`;
    }
    if (p.includes('年：') || p.includes('年）')) {
      return `<p class="text-[#d4c5a0] leading-relaxed text-sm mb-2" style="text-indent: 2em;">${p}</p>`;
    }
    return p.trim() ? `<p class="text-[#d4c5a0] leading-relaxed text-sm mb-2" style="text-indent: 2em;">${p}</p>` : '';
  }).join('');
  section4.innerHTML = `
    <h3>· 流年大运 ·</h3>
    ${yearHtml}
  `;
  container.appendChild(section4);

  // 寄语
  const section5 = document.createElement('div');
  section5.className = 'result-section fade-in';
  section5.style.animationDelay = '0.5s';
  section5.innerHTML = `
    <h3>· 大师寄语 ·</h3>
    <p class="text-[#d4c5a0] leading-relaxed text-sm italic" style="text-indent: 2em;">${report.final}</p>
  `;
  container.appendChild(section5);

  // 滚动到结果区域
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ====== 交互控制 ======

const LOADING_TEXTS = [
  '正在排盘...',
  '正在推演八字生克...',
  '正在排布紫微星曜...',
  '正在起奇门局...',
  '正在推演流年大运...',
  '天机即将揭晓...'
];

let loadingTimer = null;
let loadingTextTimer = null;
let loadingIdx = 0;

function startLoading() {
  const screen = document.getElementById('loadingScreen');
  const textEl = document.getElementById('loadingText');
  screen.classList.add('active');

  loadingIdx = 0;
  textEl.textContent = LOADING_TEXTS[0];

  loadingTextTimer = setInterval(() => {
    loadingIdx = (loadingIdx + 1) % LOADING_TEXTS.length;
    textEl.textContent = LOADING_TEXTS[loadingIdx];
  }, 500);

  return new Promise((resolve) => {
    loadingTimer = setTimeout(() => {
      clearInterval(loadingTextTimer);
      screen.classList.remove('active');
      resolve();
    }, 3200);
  });
}

function closeToast() {
  document.getElementById('toastModal').classList.remove('active');
  document.getElementById('toastOverlay').classList.remove('active');
}

function showToast(message) {
  document.getElementById('toastMessage').textContent = message;
  document.getElementById('toastModal').classList.add('active');
  document.getElementById('toastOverlay').classList.add('active');
}

function resetForm() {
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('inputSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  // 清空表单
  document.getElementById('userName').value = '';
  const radios = document.querySelectorAll('input[name="gender"]');
  radios.forEach(r => r.checked = false);
  document.getElementById('birthDate').value = '1990-01-01T12:00';
}

// ====== 主流程 ======

document.getElementById('divineBtn').addEventListener('click', async function() {
  const name = document.getElementById('userName').value.trim();
  const genderEl = document.querySelector('input[name="gender"]:checked');
  const birthDate = document.getElementById('birthDate').value;

  // 校验
  if (!name) {
    showToast('请先录入尊姓大名，方可观天机之象。');
    return;
  }
  if (!genderEl) {
    showToast('乾坤未定，请先确认性别命格。');
    return;
  }
  if (!birthDate) {
    showToast('生辰未录，天机难测。请填入出生年月日时。');
    return;
  }

  const gender = genderEl.value;

  // 开始加载动画
  this.disabled = true;
  this.textContent = '· 天机推演中 ·';

  await startLoading();

  // 执行推演
  const report = performDivination(name, gender, birthDate);

  // 渲染结果
  renderReport(report);

  // 显示结果区
  document.getElementById('resultSection').classList.remove('hidden');

  // 自动滚动到结果区域（延迟确保渲染完成）
  setTimeout(function() {
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);

  // 恢复按钮
  this.disabled = false;
  this.innerHTML = '<span>☰</span><span>开 启 命 盘</span><span>☷</span>';
});

// 按回车提交
document.getElementById('divinationForm').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('divineBtn').click();
  }
});
